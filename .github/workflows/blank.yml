name: Hello Workflow

on:
  push:
    branches:
      - main

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello to users
        run: echo "Hello user"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: Show versions of Python and Docker
        run: docker --version && python --version
